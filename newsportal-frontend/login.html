<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">DU <span>IIT</span></a>
            <div class="nav-links">
                <a href="index.html">Back to Site</a>
            </div>
        </div>
    </nav>

    <main class="container auth-wrapper">
        <div class="form-card">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Admin Login</h2>
            <div id="error-alert" class="alert alert-error"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="admin@newsportal.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>
    </main>

    <script src="auth.js"></script>
</body>
</html>
